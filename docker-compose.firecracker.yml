# Firecracker バックエンド有効時のオーバーレイ設定
# 使い方: docker compose -f docker-compose.yml -f docker-compose.firecracker.yml up -d
#
# 前提条件:
#   - /dev/kvm が存在すること（LXCコンテナ設定で lxc.mount.entry: /dev/kvm が必要）
#   - /srv/hackbento/vm/ に vmlinux と rootfs.ext4 が配置済みであること
#   - .env に VM_BACKEND=firecracker が設定済みであること

services:
  orchestrator:
    volumes:
      - /srv/hackbento/vm:/srv/hackbento/vm:ro
    devices:
      - /dev/kvm:/dev/kvm
