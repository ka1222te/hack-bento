{% extends "base.html" %}
{% block title %}管理画面 — HackBento{% endblock %}

{% block body %}
<div id="app">
  {% include "partials/navbar.html" %}

  <div class="container admin-container">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="envs">起動中の環境</button>
      <button class="tab-btn" data-tab="users">ユーザ管理</button>
      <button class="tab-btn" data-tab="images">プロジェクト管理</button>
    </div>

    <!-- Running Envs -->
    <div id="tab-envs" class="tab-panel active">
      <h2 class="panel-title">起動中の環境 <button class="btn btn-sm btn-outline" onclick="loadAdminEnvs()">更新</button></h2>
      <div class="table-wrap">
        <table class="data-table" id="envs-table">
          <thead><tr><th>ID</th><th>起動ユーザ</th><th>イメージ</th><th>IP</th><th>ステータス</th><th>開始</th><th>期限</th><th>操作</th></tr></thead>
          <tbody id="envs-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Users -->
    <div id="tab-users" class="tab-panel hidden">
      <div class="panel-header">
        <h2 class="panel-title">ユーザ管理</h2>
        <button class="btn btn-sm btn-primary" onclick="showCreateUserModal()">+ ローカルユーザ追加</button>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="users-table">
          <thead><tr><th>ID</th><th>ユーザ名</th><th>メール</th><th>ロール</th><th>認証方式</th><th>有効</th><th>操作</th></tr></thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Projects -->
    <div id="tab-images" class="tab-panel hidden">
      <div class="panel-header">
        <h2 class="panel-title">プロジェクト管理</h2>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="images-table">
          <thead><tr><th>プロジェクト名</th><th>Link</th><th>難易度</th><th>公開設定</th><th>有効</th><th>操作</th></tr></thead>
          <tbody id="images-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Create User -->
<div id="modal-user" class="modal hidden">
  <div class="modal-backdrop" onclick="closeModal('modal-user')"></div>
  <div class="modal-box">
    <h3 class="modal-title">ローカルユーザ追加</h3>
    <form id="form-user">
      <div class="form-group"><label>ユーザ名</label><input name="username" required /></div>
      <div class="form-group"><label>パスワード</label><input name="password" type="password" required /></div>
      <div class="form-group"><label>ロール</label>
        <select name="role"><option value="user">user</option><option value="admin">admin</option></select>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">作成</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal('modal-user')">キャンセル</button>
      </div>
    </form>
  </div>
</div>

<!-- Overlay: Change Password (admin) -->
<div id="overlay-pw" class="modal hidden">
  <div class="modal-backdrop" onclick="closeModal('overlay-pw')"></div>
  <div class="modal-box" style="max-width:400px">
    <h3 class="modal-title">パスワード変更</h3>
    <p id="overlay-pw-username" style="color:var(--text2);font-size:.875rem;margin-bottom:1rem"></p>
    <form id="form-pw">
      <div class="form-group"><label>新しいパスワード</label><input id="overlay-pw-new" type="password" placeholder="8文字以上" required /></div>
      <div class="form-group"><label>新しいパスワード（確認）</label><input id="overlay-pw-confirm" type="password" placeholder="もう一度入力" required /></div>
      <div id="overlay-pw-error" class="alert alert-error hidden" style="margin-bottom:.75rem"></div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary">変更</button>
        <button type="button" class="btn btn-ghost" onclick="closeModal('overlay-pw')">キャンセル</button>
      </div>
    </form>
  </div>
</div>

<!-- 3点ドロップダウン（body直下・position:fixed） -->
<div id="user-action-dropdown" class="user-action-dropdown hidden"></div>

<div id="toast-container"></div>
{% endblock %}

{% block scripts %}
<script>
const API = {
  token: () => localStorage.getItem('hb_token'),
  headers: () => ({ 'Content-Type': 'application/json', 'Authorization': `Bearer ${API.token()}` }),
  async get(url) { return fetch(url, { headers: API.headers() }); },
  async post(url, body) { return fetch(url, { method: 'POST', headers: API.headers(), body: JSON.stringify(body || {}) }); },
  async patch(url, body) { return fetch(url, { method: 'PATCH', headers: API.headers(), body: JSON.stringify(body || {}) }); },
  async del(url) { return fetch(url, { method: 'DELETE', headers: API.headers() }); },
};

if (!API.token() || localStorage.getItem('hb_role') !== 'admin') { window.location.href = '/login'; }

initNavbar();

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
    btn.classList.add('active');
    document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
    if (btn.dataset.tab === 'envs') loadAdminEnvs();
    if (btn.dataset.tab === 'users') loadUsers();
    if (btn.dataset.tab === 'images') loadAdminImages();
  });
});

function fmt(iso) {
  return new Date(iso + 'Z').toLocaleString('ja-JP');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- Envs ----
async function loadAdminEnvs() {
  const res = await API.get('/api/admin/envs');
  if (!res.ok) return;
  const envs = await res.json();
  const tbody = document.getElementById('envs-tbody');
  tbody.innerHTML = envs.map(e => `
    <tr>
      <td>${e.id}</td>
      <td>${escHtml(e.username)}</td>
      <td>${escHtml(e.image_name)}</td>
      <td><code>${escHtml(e.ip_address||'-')}</code></td>
      <td><span class="status-badge ${e.status}">${e.status}</span></td>
      <td>${fmt(e.started_at)}</td>
      <td>${fmt(e.expires_at)}</td>
      <td><button class="btn btn-xs btn-danger" onclick="forceStop(${e.id})">強制停止</button></td>
    </tr>
  `).join('') || '<tr><td colspan="8" class="empty-cell">起動中の環境はありません</td></tr>';
}

async function forceStop(envId) {
  if (!confirm(`環境 #${envId} を強制停止しますか？`)) return;
  const res = await API.post(`/api/admin/envs/${envId}/force-stop`);
  if (res.ok) { showToast('強制停止しました', 'success'); loadAdminEnvs(); }
  else { const d = await res.json(); showToast(d.detail, 'error'); }
}

// ---- Users ----
async function loadUsers() {
  const res = await API.get('/api/admin/users');
  if (!res.ok) return;
  const users = await res.json();
  const tbody = document.getElementById('users-tbody');
  const myUsername = localStorage.getItem('hb_username') || '';
  tbody.innerHTML = users.map(u => {
    const isSelf = u.username === myUsername;
    const isLocal = u.auth_provider === 'local';
    const emailDisplay = u.email || '-';

    const actionBtns = isSelf
      ? '<span class="cat-badge">変更不可</span>'
      : `
        <button class="btn btn-xs btn-outline" onclick="toggleUser(${u.id}, ${u.is_active})">
          ${u.is_active ? '無効化' : '有効化'}
        </button>
        <button class="btn btn-xs btn-outline" onclick="toggleRole(${u.id}, '${u.role}')">
          ${u.role === 'admin' ? '一般ユーザに降格' : '管理者に昇格'}
        </button>
        <button class="btn btn-xs btn-outline" onclick="toggleDropdown(event, ${u.id}, ${isLocal}, '${escHtml(u.username)}', '${u.role}')">&#8942;</button>
      `;

    return `
    <tr>
      <td>${u.id}</td>
      <td>${escHtml(u.username)}${isSelf ? ' <span class="cat-badge">you</span>' : ''}</td>
      <td>${escHtml(emailDisplay)}</td>
      <td><span class="role-badge role-${u.role}">${u.role}</span></td>
      <td>${u.auth_provider}</td>
      <td><span class="active-dot ${u.is_active ? 'active' : 'inactive'}"></span></td>
      <td style="white-space:nowrap">${actionBtns}</td>
    </tr>`;
  }).join('');
}

async function toggleUser(userId, current) {
  const res = await API.patch(`/api/admin/users/${userId}`, { is_active: !current });
  if (res.ok) { showToast('更新しました', 'success'); loadUsers(); }
  else { const d = await res.json(); showToast(d.detail, 'error'); }
}

async function toggleRole(userId, currentRole) {
  const newRole = currentRole === 'admin' ? 'user' : 'admin';
  const label = newRole === 'admin' ? '管理者に昇格' : '一般ユーザに降格';
  if (!confirm(`${label}しますか？`)) return;
  const res = await API.patch(`/api/admin/users/${userId}`, { role: newRole });
  if (res.ok) { showToast('更新しました', 'success'); loadUsers(); }
  else { const d = await res.json(); showToast(d.detail, 'error'); }
}

async function deleteUser(userId, username, role) {
  const adminNote = role === 'admin' ? '\n※管理者ユーザは削除できません。先に一般ユーザに降格してください。' : '';
  if (!confirm(`ユーザ「${username}」を削除しますか？\nこのユーザのプロジェクト・環境もすべて削除されます。${adminNote}`)) return;
  const res = await API.del(`/api/admin/users/${userId}`);
  if (res.ok) { showToast('削除しました', 'success'); loadUsers(); }
  else { const d = await res.json(); showToast(d.detail, 'error'); }
}

// 3点ドロップダウン（body直下・fixed配置）
const _dd = document.getElementById('user-action-dropdown');
let _ddOpen = false;

function toggleDropdown(e, userId, isLocal, username, role) {
  e.stopPropagation();
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();

  if (_ddOpen && _dd.dataset.userId === String(userId)) {
    _dd.classList.add('hidden');
    _ddOpen = false;
    return;
  }

  _dd.dataset.userId = userId;
  _dd.dataset.role = role;
  _dd.innerHTML = [
    isLocal ? `<button onclick="showPwOverlay(${userId}, '${username}'); _closeDropdown()">設定変更</button>` : '',
    `<button class="danger" onclick="deleteUser(${userId}, '${username}', _dd.dataset.role); _closeDropdown()">ユーザ削除</button>`,
  ].join('');

  // ボタン直下に表示、画面右端を超えないよう調整
  const ddWidth = 130;
  let left = rect.right - ddWidth;
  if (left < 4) left = 4;
  _dd.style.top  = (rect.bottom + window.scrollY + 4) + 'px';
  _dd.style.left = left + 'px';
  _dd.classList.remove('hidden');
  _ddOpen = true;
}

function _closeDropdown() {
  _dd.classList.add('hidden');
  _ddOpen = false;
}

document.addEventListener('click', _closeDropdown);

// パスワード変更オーバーレイ
let _pwTargetId = null;
function showPwOverlay(userId, username) {
  _pwTargetId = userId;
  document.getElementById('overlay-pw-username').textContent = `対象: ${username}`;
  document.getElementById('overlay-pw-new').value = '';
  document.getElementById('overlay-pw-confirm').value = '';
  document.getElementById('overlay-pw-error').classList.add('hidden');
  document.getElementById('overlay-pw').classList.remove('hidden');
}

document.getElementById('form-pw').addEventListener('submit', async e => {
  e.preventDefault();
  const errBox = document.getElementById('overlay-pw-error');
  errBox.classList.add('hidden');
  const newPw = document.getElementById('overlay-pw-new').value;
  const confirmPw = document.getElementById('overlay-pw-confirm').value;
  if (newPw !== confirmPw) {
    errBox.textContent = 'パスワードが一致しません';
    errBox.classList.remove('hidden');
    return;
  }
  if (newPw.length < 8) {
    errBox.textContent = 'パスワードは8文字以上にしてください';
    errBox.classList.remove('hidden');
    return;
  }
  const res = await API.patch(`/api/admin/users/${_pwTargetId}`, { password: newPw });
  if (res.ok) {
    showToast('パスワードを変更しました', 'success');
    closeModal('overlay-pw');
  } else {
    const d = await res.json();
    errBox.textContent = d.detail || 'エラーが発生しました';
    errBox.classList.remove('hidden');
  }
});

function showCreateUserModal() { document.getElementById('modal-user').classList.remove('hidden'); }

document.getElementById('form-user').addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  // メールはユーザ名@local で自動生成
  data.email = `${data.username}@local`;
  const res = await API.post('/api/admin/users', data);
  if (res.ok) { showToast('ユーザを作成しました', 'success'); closeModal('modal-user'); e.target.reset(); loadUsers(); }
  else { const d = await res.json(); showToast(d.detail || 'エラー', 'error'); }
});

// ---- Images ----
async function loadAdminImages() {
  const res = await API.get('/api/images/');
  if (!res.ok) return;
  const images = await res.json();
  const visLabel = { public: '🌍 Public', protected: '🔒 Protected', private: '🔐 Private' };
  const tbody = document.getElementById('images-tbody');
  tbody.innerHTML = images.map(img => `
    <tr>
      <td><a href="/${escHtml(img.owner_username)}/${escHtml(img.slug)}" style="color:var(--accent);font-weight:600">${escHtml(img.name)}</a></td>
      <td style="color:var(--text2);font-size:.85rem">${escHtml(img.owner_username||'-')} / <code>${escHtml(img.slug)}</code></td>
      <td><span class="diff-badge diff-${img.difficulty}">${img.difficulty}</span></td>
      <td>${visLabel[img.visibility] || img.visibility}</td>
      <td><span class="active-dot ${img.is_active ? 'active' : 'inactive'}"></span></td>
      <td>
        <button class="btn btn-xs btn-danger" onclick="deleteImage(${img.id})">削除</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="6" class="empty-cell">プロジェクトがありません</td></tr>';
}

async function deleteImage(imageId) {
  if (!confirm('このプロジェクトを無効化しますか？')) return;
  const res = await API.del(`/api/images/${imageId}`);
  if (res.ok) { showToast('無効化しました', 'success'); loadAdminImages(); }
  else { const d = await res.json(); showToast(d.detail, 'error'); }
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
}

function showToast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.classList.add('toast-show'), 10);
  setTimeout(() => { t.classList.remove('toast-show'); setTimeout(() => t.remove(), 300); }, 3000);
}

loadAdminEnvs();
</script>

<style>
.user-action-dropdown {
  position: absolute;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 4px 12px rgba(0,0,0,.25);
  z-index: 9999;
  min-width: 130px;
  padding: 4px 0;
}
.user-action-dropdown button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 7px 14px;
  font-size: .85rem;
  background: none;
  border: none;
  color: var(--text1);
  cursor: pointer;
}
.user-action-dropdown button:hover { background: var(--bg4); }
.user-action-dropdown button.danger { color: var(--red); }
</style>
{% endblock %}
