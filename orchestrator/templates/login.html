{% extends "base.html" %}
{% block title %}ログイン — HackBento{% endblock %}

{% block body %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <img src="/static/img/bento.svg" class="login-logo-svg" alt="HackBento" />
      <h1 class="logo-text">HackBento</h1>
      <p class="logo-sub">Enjoy the Hacking</p>
      <div id="ldap-badge" class="hidden" style="margin-top:.5rem">
        <span class="cat-badge" style="background:var(--bg4);color:var(--text2);font-size:.75rem;padding:.2rem .6rem;border-radius:99px">
          <span id="ldap-badge-dot" style="display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--text3);margin-right:.35rem;vertical-align:middle"></span>
          LDAP
        </span>
      </div>
    </div>

    <div id="login-error" class="alert alert-error hidden"></div>

    <form id="login-form" class="login-form">
      <div class="form-group">
        <label for="username">ユーザ名</label>
        <input type="text" id="username" name="username" placeholder="username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="login-btn">
        <span class="btn-text">ログイン</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </form>

    {% if settings.GOOGLE_OAUTH_ENABLED %}
    <div class="divider"><span>または</span></div>
    <a href="/api/auth/oauth/google" class="btn btn-google btn-full">
      <svg class="google-icon" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleでログイン
    </a>
    {% endif %}


  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
// LDAPバッジ: 有効かつ到達可能なら緑ドットで表示
(async () => {
  try {
    const res = await fetch('/api/auth/ldap-status');
    if (!res.ok) return;
    const { enabled, reachable } = await res.json();
    if (!enabled) return;
    const badge = document.getElementById('ldap-badge');
    const dot = document.getElementById('ldap-badge-dot');
    badge.classList.remove('hidden');
    if (reachable) {
      dot.style.background = 'var(--green, #3fb950)';
      badge.querySelector('span').title = 'LDAPサーバに接続可能';
    } else {
      dot.style.background = 'var(--red, #f85149)';
      badge.querySelector('span').title = 'LDAPサーバに接続できません';
    }
  } catch {}
})();

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errBox = document.getElementById('login-error');
  errBox.classList.add('hidden');
  btn.disabled = true;
  btn.querySelector('.btn-spinner').classList.remove('hidden');
  btn.querySelector('.btn-text').textContent = '認証中...';

  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value,
    }),
  });

  if (res.ok) {
    const data = await res.json();
    localStorage.setItem('hb_token', data.access_token);
    localStorage.setItem('hb_username', data.username);
    localStorage.setItem('hb_role', data.role);
    localStorage.setItem('hb_needs_setup', data.needs_username_setup ? 'true' : 'false');
    window.location.href = data.needs_username_setup ? '/setup-username' : '/';
  } else {
    const data = await res.json();
    errBox.textContent = data.detail || '認証に失敗しました';
    errBox.classList.remove('hidden');
    btn.disabled = false;
    btn.querySelector('.btn-spinner').classList.add('hidden');
    btn.querySelector('.btn-text').textContent = 'ログイン';
  }
});
</script>
{% endblock %}
