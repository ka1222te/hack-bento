{% extends "base.html" %}
{% block title %}404 — HackBento{% endblock %}

{% block body %}
<div id="app">
  {% include "partials/navbar.html" %}
  <div class="container" style="max-width:600px;padding-top:6rem;text-align:center">
    <p style="font-size:5rem;margin-bottom:1rem">🔒</p>
    <h1 style="font-size:2rem;font-weight:700;margin-bottom:.75rem">404 — Not Found</h1>
    <p style="color:var(--text2);margin-bottom:1rem">
      このページは存在しないか、閲覧する権限がありません。
    </p>
    <p id="redirect-countdown-msg" style="display:none;color:var(--text3);font-size:.9rem;margin-bottom:2rem">
      <span id="redirect-countdown">10</span> 秒後にログインページへリダイレクトします
    </p>
    <a id="login-btn" href="/login" class="btn btn-primary" style="display:none">ログイン画面に進む</a>
  </div>
</div>
<div id="toast-container"></div>
{% endblock %}

{% block scripts %}
<script>
initNavbar();
if (!sessionStorage.getItem('hb_token')) {
  document.getElementById('redirect-countdown-msg').style.display = '';
  document.getElementById('login-btn').style.display = '';
  let _count = 10;
  const _el = document.getElementById('redirect-countdown');
  const _iv = setInterval(() => {
    _count--;
    if (_el) _el.textContent = _count;
    if (_count <= 0) { clearInterval(_iv); window.location.href = '/login'; }
  }, 1000);
}
</script>
{% endblock %}
