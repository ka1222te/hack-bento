services:
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: hackbento-orchestrator
    env_file:
      - .env
    volumes:
      - ./orchestrator:/app
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://127.0.0.1:${PORT:-8000}/health"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 15s
